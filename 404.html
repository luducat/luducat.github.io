<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>luducat</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #131d2b;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .wrap {
      text-align: center;
    }
    .wrap svg {
      width: 360px;
      height: 360px;
    }
    .title {
      margin: 0.6rem 0 0;
      color: #dde1e1;
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 0.08em;
    }
    .blurb {
      margin: 0.8rem auto 0;
      max-width: 480px;
      color: #8fa8a3;
      font-size: 1.05rem;
      line-height: 1.5;
      letter-spacing: 0.02em;
    }
    .redirect {
      margin-top: 1.6rem;
      color: #5a9a90;
      font-size: 0.9rem;
      letter-spacing: 0.03em;
    }
    .redirect a {
      color: #33bdaa;
      text-decoration: none;
    }
    .redirect a:hover {
      text-decoration: underline;
    }
    .skip {
      display: block;
      margin-top: 0.4rem;
    }
    .skip a {
      color: #5a9a90;
      text-decoration: none;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .skip a:hover {
      color: #33bdaa;
    }
    .download-btn {                                                                                                             
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 1.6rem;
        padding: 0.7rem 1.5rem;
        min-width: 11rem;
        background: #33bdaa;
        color: #131d2b;
        border-radius: 6px;
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        transition: background 0.2s;
      }
      .download-btn:hover {
        background: #3fccb9;
      }
      .download-btn + .download-btn {
        margin-left: 0.8rem;
      }
      .download-btn svg {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }
  </style>
  <script>
    /* ── i18n ── add new languages here ── */
    var L = {
      en: {
        blurb: "Multi-store game catalog browser. No accounts, no telemetry, works offline. Your library, your rules.",
        redirect: 'Redirecting to <a href="https://github.com/luducat/luducat">GitHub</a> in <span id="countdown">10</span>s',
        skip: "skip"
      },
      de: {
        blurb: "Multi-Store-Spielekatalog. Keine Konten, keine Telemetrie, funktioniert offline. Deine Bibliothek, deine Regeln.",
        redirect: 'Weiterleitung zu <a href="https://github.com/luducat/luducat">GitHub</a> in <span id="countdown">10</span>s',
        skip: "weiter"
      },
      fr: {
        blurb: "Catalogue de jeux multi-boutiques. Pas de compte, pas de t\u00e9l\u00e9m\u00e9trie, fonctionne hors ligne. Votre biblioth\u00e8que, vos r\u00e8gles.",
        redirect: 'Redirection vers <a href="https://github.com/luducat/luducat">GitHub</a> dans <span id="countdown">10</span>s',
        skip: "passer"
      },
      es: {
        blurb: "Cat\u00e1logo de juegos multi-tienda. Sin cuentas, sin telemetr\u00eda, funciona sin conexi\u00f3n. Tu biblioteca, tus reglas.",
        redirect: 'Redirigiendo a <a href="https://github.com/luducat/luducat">GitHub</a> en <span id="countdown">10</span>s',
        skip: "saltar"
      },
      it: {
        blurb: "Catalogo giochi multi-store. Nessun account, nessuna telemetria, funziona offline. La tua libreria, le tue regole.",
        redirect: 'Reindirizzamento a <a href="https://github.com/luducat/luducat">GitHub</a> tra <span id="countdown">10</span>s',
        skip: "salta"
      }
    };

    function detectLang() {
      var langs = navigator.languages || [navigator.language || "en"];
      for (var i = 0; i < langs.length; i++) {
        var code = langs[i].split("-")[0].toLowerCase();
        if (L[code]) return code;
      }
      return "en";
    }

    var seconds = 5;
    function updateCountdown() {
      var el = document.getElementById('countdown');
      if (el) el.textContent = seconds;
      if (seconds <= 0) {
        window.location.href = 'https://github.com/luducat/luducat';
        return;
      }
      seconds--;
      setTimeout(updateCountdown, 1000);
    }

    window.onload = function() {
      var t = L[detectLang()];
      document.getElementById('blurb').innerHTML = t.blurb;
      document.getElementById('redirect').innerHTML = t.redirect;
      document.getElementById('skip-link').textContent = t.skip;
      updateCountdown();
    };
  </script>
